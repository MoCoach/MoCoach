<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - One to One</title>
  <meta name="description" content="One to One admin panel for managing coaches, customers, and messages.">
  <link rel="icon" type="image/png" href="assets/img/favicon-logo121.png?v=2">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/sanitize.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style-mobile.css">
  <link rel="stylesheet" href="css/style-desktop.css" media="(min-width: 769px)">
  <style>
    .admin-tab { cursor: pointer; }
    .admin-tab.active { border-bottom-color: #0D9488; color: #fff; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-teal-600 selection:text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center space-x-4">
        <img src="assets/img/favicon-logo121.png" alt="One to One" class="h-12 w-auto">
        <div>
          <h1 class="text-xl sm:text-2xl font-extrabold text-white">Admin Panel</h1>
          <p id="admin-greeting" class="text-sm text-slate-400"></p>
        </div>
      </div>
      <div class="flex items-center space-x-3">
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-bold px-4 py-2.5 rounded-xl transition">Back to Site</a>
        <button id="admin-logout-btn" class="bg-red-950/40 border border-red-900/50 hover:bg-red-900/40 text-red-400 text-sm font-bold px-4 py-2.5 rounded-xl transition">Logout</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-slate-800 mb-6">
      <button class="admin-tab active text-white font-bold px-6 py-3 border-b-2 border-teal-500" data-tab="coaches">Coaches</button>
      <button class="admin-tab text-slate-400 font-bold px-6 py-3 border-b-2 border-transparent hover:text-white" data-tab="customers">Customers</button>
      <button class="admin-tab text-slate-400 font-bold px-6 py-3 border-b-2 border-transparent hover:text-white" data-tab="messages">Messages</button>
    </div>

    <!-- Coaches Tab -->
    <div id="admin-coaches-tab" class="admin-tab-content">
      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-4 sm:p-6 backdrop-blur-md">
        <h2 class="text-lg sm:text-xl font-extrabold text-white mb-4">Coach Management</h2>
        <input id="admin-coach-filter" type="text" placeholder="Search by name, username, or email..."
          class="w-full mb-4 px-4 py-2.5 bg-slate-900/60 border border-slate-700/60 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500/50 focus:border-teal-500/50 transition">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[900px]">
            <thead>
              <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-800">
                <th class="text-left py-3 px-2">Name</th>
                <th class="text-left py-3 px-2">Username</th>
                <th class="text-left py-3 px-2">Email</th>
                <th class="text-left py-3 px-2">City</th>
                <th class="text-center py-3 px-2">Vetted</th>
                <th class="text-center py-3 px-2">Certified</th>
                <th class="text-center py-3 px-2">Profile</th>
                <th class="text-center py-3 px-2">Email</th>
                <th class="text-center py-3 px-2">IP</th>
                <th class="text-center py-3 px-2">Msg</th>
              </tr>
            </thead>
            <tbody id="admin-coaches-body"></tbody>
          </table>
        </div>
        <p id="admin-coaches-empty" class="text-center text-slate-500 py-8 hidden">No coaches registered yet.</p>
      </div>
    </div>

    <!-- Customers Tab -->
    <div id="admin-customers-tab" class="admin-tab-content hidden">
      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-4 sm:p-6 backdrop-blur-md">
        <h2 class="text-lg sm:text-xl font-extrabold text-white mb-4">Customer Management</h2>
        <input id="admin-customer-filter" type="text" placeholder="Search by username or email..."
          class="w-full mb-4 px-4 py-2.5 bg-slate-900/60 border border-slate-700/60 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500/50 focus:border-teal-500/50 transition">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[700px]">
            <thead>
              <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-800">
                <th class="text-left py-3 px-2">Username</th>
                <th class="text-left py-3 px-2">Email</th>
                <th class="text-center py-3 px-2">Profile</th>
                <th class="text-center py-3 px-2">Email</th>
                <th class="text-center py-3 px-2">IP</th>
                <th class="text-center py-3 px-2">Msg</th>
              </tr>
            </thead>
            <tbody id="admin-customers-body"></tbody>
          </table>
        </div>
        <p id="admin-customers-empty" class="text-center text-slate-500 py-8 hidden">No customers registered yet.</p>
      </div>
    </div>

    <!-- Messages Tab -->
    <div id="admin-messages-tab" class="admin-tab-content hidden">
      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-6 backdrop-blur-md">
        <h2 class="text-lg sm:text-xl font-extrabold text-white mb-4">Message Moderation</h2>
        <input id="admin-message-filter" type="text" placeholder="Search by username..."
          class="w-full mb-4 px-4 py-2.5 bg-slate-900/60 border border-slate-700/60 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500/50 focus:border-teal-500/50 transition">
        <div id="admin-conversations-list" class="space-y-3">
          <!-- Filled by JS -->
        </div>
        <p id="admin-messages-empty" class="text-center text-slate-500 py-8">No conversations found.</p>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <div id="mobile-tab-bar-placeholder"></div>
  <script>
    const AdminApp = {
      _allUsers: [],
      _coachFilter: '',
      _customerFilter: '',
      _messageFilter: '',

      async init() {
        const auth = JSON.parse(sessionStorage.getItem('mocoach_auth') || 'null');
        if (!auth || auth.role !== 'admin') {
          window.location.href = 'index.html';
          return;
        }
        document.getElementById('admin-greeting').textContent = `Logged in as ${auth.username}`;
        this.bindEvents();
        await this._loadUsers();
        this.renderCoaches();
        this.renderCustomers();
        this.renderConversations();
        document.body.classList.add('loaded');
      },

      async _loadUsers() {
        const res = await api.getUsers();
        if (res.success) {
          this._allUsers = res.data || [];
        }
      },

      bindEvents() {
        document.getElementById('admin-logout-btn').addEventListener('click', () => {
          sessionStorage.removeItem('mocoach_auth');
          window.location.href = 'index.html';
        });

        document.querySelectorAll('.admin-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.admin-tab').forEach(b => {
              b.classList.remove('active');
              b.classList.add('text-slate-400');
              b.style.borderBottomColor = 'transparent';
            });
            btn.classList.add('active');
            btn.classList.remove('text-slate-400');
            btn.style.borderBottomColor = '#0D9488';

            document.querySelectorAll('.admin-tab-content').forEach(t => t.classList.add('hidden'));
            const tab = document.getElementById(`admin-${btn.dataset.tab}-tab`);
            if (tab) tab.classList.remove('hidden');
          });
        });

        const filterDefs = [
          { id: 'admin-coach-filter', stateKey: '_coachFilter', render: 'renderCoaches' },
          { id: 'admin-customer-filter', stateKey: '_customerFilter', render: 'renderCustomers' },
          { id: 'admin-message-filter', stateKey: '_messageFilter', render: 'renderConversations' },
        ];
        filterDefs.forEach(({ id, stateKey, render }) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') e.preventDefault();
          });
          el.addEventListener('input', (e) => {
            this[stateKey] = e.target.value.toLowerCase();
            this[render]();
          });
        });
      },

      _coachMatches(c, filter) {
        if (!filter) return true;
        const name = `${c.first_name || ''} ${c.last_name || ''}`.toLowerCase();
        return name.includes(filter)
          || c.username.toLowerCase().includes(filter)
          || c.email.toLowerCase().includes(filter);
      },

      _customerMatches(u, filter) {
        if (!filter) return true;
        return u.username.toLowerCase().includes(filter)
          || u.email.toLowerCase().includes(filter);
      },

      _messageMatches(conv, filter) {
        if (!filter) return true;
        return conv._searchText.toLowerCase().includes(filter);
      },

      renderCoaches() {
        const tbody = document.getElementById('admin-coaches-body');
        const coaches = this._allUsers.filter(u => u.is_coach && this._coachMatches(u, this._coachFilter));
        const empty = document.getElementById('admin-coaches-empty');

        if (coaches.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');

        tbody.innerHTML = coaches.map(c => {
          const isVetted = c.is_vetted || false;
          const isCertified = c.is_certified || false;
          const isBlocked = c.is_blocked || false;
          const emailBlocked = c.email_blocked || false;
          const ipBlocked = c.ip_blocked || false;
          const msgBlocked = c.is_messaging_blocked || false;
          return `
            <tr class="border-b border-slate-800/50 hover:bg-slate-800/30">
              <td class="py-3 px-2 text-white font-semibold">${escapeHtml(c.first_name || '')} ${escapeHtml(c.last_name || '')}</td>
              <td class="py-3 px-2 text-slate-300">${escapeHtml(c.username)}</td>
              <td class="py-3 px-2 text-slate-300">${escapeHtml(c.email)}</td>
              <td class="py-3 px-2 text-slate-300">${escapeHtml(c.coach?.city || '')}</td>
              <td class="py-3 px-2 text-center">
                <input type="checkbox" ${isVetted ? 'checked' : ''} onchange="AdminApp.toggleFlag(${c.id}, 'is_vetted', this.checked)" class="w-4 h-4 rounded accent-teal-600">
              </td>
              <td class="py-3 px-2 text-center">
                <input type="checkbox" ${isCertified ? 'checked' : ''} onchange="AdminApp.toggleFlag(${c.id}, 'is_certified', this.checked)" class="w-4 h-4 rounded accent-amber-600">
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${c.id}, 'is_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${isBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${isBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${c.id}, 'email_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${emailBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${emailBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${c.id}, 'ip_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${ipBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${ipBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${c.id}, 'is_messaging_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${msgBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${msgBlocked ? 'Blocked' : 'Active'}</button>
              </td>
            </tr>
          `;
        }).join('');
      },

      renderCustomers() {
        const tbody = document.getElementById('admin-customers-body');
        const customers = this._allUsers.filter(u => !u.is_coach && this._customerMatches(u, this._customerFilter));
        const empty = document.getElementById('admin-customers-empty');

        if (customers.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');

        tbody.innerHTML = customers.map(u => {
          const isBlocked = u.is_blocked || false;
          const emailBlocked = u.email_blocked || false;
          const ipBlocked = u.ip_blocked || false;
          const msgBlocked = u.is_messaging_blocked || false;
          return `
            <tr class="border-b border-slate-800/50 hover:bg-slate-800/30">
              <td class="py-3 px-2 text-white font-semibold">${escapeHtml(u.username)}</td>
              <td class="py-3 px-2 text-slate-300">${escapeHtml(u.email)}</td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${u.id}, 'is_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${isBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${isBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${u.id}, 'email_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${emailBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${emailBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${u.id}, 'ip_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${ipBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${ipBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleBlock(${u.id}, 'is_messaging_blocked')" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${msgBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'}">${msgBlocked ? 'Blocked' : 'Active'}</button>
              </td>
            </tr>
          `;
        }).join('');
      },

      async toggleFlag(userId, flag, value) {
        const body = {};
        body[flag] = value;
        const res = await api.flagUser(userId, body);
        if (res.success) {
          await this._loadUsers();
          this.renderCoaches();
          this.showToast(`${flag} updated`, 'success');
        } else {
          this.showToast(res.error || 'Failed', 'error');
        }
      },

      async toggleBlock(userId, flag) {
        const user = this._allUsers.find(u => u.id === userId);
        if (!user) return;
        const currentVal = user[flag] || false;
        const body = {};
        body[flag] = !currentVal;
        const res = await api.blockUser(userId, body);
        if (res.success) {
          await this._loadUsers();
          this.renderCoaches();
          this.renderCustomers();
          this.showToast(`${flag} toggled`, 'success');
        } else {
          this.showToast(res.error || 'Failed', 'error');
        }
      },

      async removePhotos(userId, username) {
        if (!confirm(`Remove all photos for ${username}?`)) return;
        const res = await api.deleteUserPictures(userId);
        if (res.success) {
          this.showToast('Photos removed', 'success');
        } else {
          this.showToast(res.error || 'Failed', 'error');
        }
      },

      async renderConversations() {
        const container = document.getElementById('admin-conversations-list');
        const empty = document.getElementById('admin-messages-empty');

        // 1) Fetch chats for ALL users in parallel
        const chatResults = await Promise.all(
          this._allUsers.map(user => api.getUserChats(user.id))
        );

        // 2) Flatten into a single list of chats, deduplicated by chat id
        const chatMap = new Map();
        for (const res of chatResults) {
          if (res.success && Array.isArray(res.data)) {
            for (const chat of res.data) {
              chatMap.set(chat.id, chat);
            }
          }
        }

        // 3) Fetch messages for ALL chats in parallel
        const chatIds = [...chatMap.keys()];
        const msgResults = await Promise.all(
          chatIds.map(id => api.getChatMessages(id))
        );

        // 4) Build a map of chatId -> messages
        const msgMap = new Map();
        for (let i = 0; i < chatIds.length; i++) {
          const res = msgResults[i];
          msgMap.set(chatIds[i], res.success && Array.isArray(res.data) ? res.data : []);
        }

        // 5) Assemble the conversation data
        let allConvData = [];
        for (const [chatId, chat] of chatMap) {
          const coachName = chat.coach
            ? `${chat.coach.first_name || ''} ${chat.coach.last_name || ''}`.trim() || chat.coach.username || 'Unknown'
            : 'Unknown';
          const participants = [coachName.toLowerCase()];
          if (chat.customer?.username) participants.push(chat.customer.username.toLowerCase());
          if (chat.coach?.username) participants.push(chat.coach.username.toLowerCase());
          allConvData.push({
            id: chatId,
            coachName,
            _searchText: participants.join(' '),
            messages: (msgMap.get(chatId) || []).map(m => ({
              id: m.id,
              senderId: m.sender.id,
              senderName: m.sender.username || m.sender.first_name || 'Unknown',
              text: m.text,
              timestamp: m.timestamp * 1000,
            })),
          });
        }

        allConvData = allConvData.filter(c => this._messageMatches(c, this._messageFilter));

        if (allConvData.length === 0) {
          container.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');

        container.innerHTML = allConvData.map(conv => {
          const msgCount = conv.messages.length;
          return `
            <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl overflow-hidden">
              <button onclick="AdminApp.toggleConv(${conv.id})" class="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-800/30 transition">
                <div class="flex items-center space-x-3">
                  <i data-lucide="message-circle" class="w-5 h-5 text-teal-400"></i>
                  <span class="font-semibold text-white">${escapeHtml(conv.coachName)}</span>
                  <span class="text-xs text-slate-500">(${msgCount} messages)</span>
                </div>
                <i id="chevron-${conv.id}" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
              </button>
              <div id="conv-body-${conv.id}" class="hidden border-t border-slate-800/50 px-5 py-3 space-y-2 max-h-80 overflow-y-auto">
                ${conv.messages.map(msg => `
                  <div class="flex items-start justify-between gap-2 group">
                    <div class="flex-1">
                      <p class="text-xs text-slate-500">${escapeHtml(msg.senderName)} <span class="text-slate-600">· ${new Date(msg.timestamp).toLocaleString()}</span></p>
                      <p class="text-sm text-slate-200 mt-0.5">${escapeHtml(msg.text)}</p>
                    </div>
                    <button onclick="AdminApp.deleteMessage(${conv.id}, ${JSON.stringify(msg.id)})" class="opacity-100 sm:opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 p-1 transition flex-shrink-0" title="Delete message">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');
        if (window.lucide) lucide.createIcons();
      },

      toggleConv(id) {
        const body = document.getElementById(`conv-body-${id}`);
        const chevron = document.getElementById(`chevron-${id}`);
        if (!body) return;
        body.classList.toggle('hidden');
        if (chevron) {
          chevron.style.transform = body.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
      },

      async deleteMessage(convId, msgId) {
        if (!confirm('Delete this message?')) return;
        const res = await api.deleteMessage(msgId);
        if (res.success) {
          this.renderConversations();
          this.showToast('Message deleted', 'success');
        } else {
          this.showToast(res.error || 'Failed to delete message', 'error');
        }
      },

      showToast(msg, type) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-6 right-6 z-50 ${type === 'success' ? 'bg-amber-600' : 'bg-red-600'} text-white text-sm font-medium px-5 py-3 rounded-xl shadow-lg flex items-center space-x-2`;
        toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i><span>${escapeHtml(msg)}</span>`;
        document.body.appendChild(toast);
        if (window.lucide) lucide.createIcons();
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
      },
    };

    document.addEventListener('DOMContentLoaded', () => AdminApp.init());
  </script>
</body>
</html>
