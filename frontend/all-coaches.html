<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Coaches - One to One</title>
  <meta name="description" content="Browse all vetted sports and wellness coaches in Mauritius. Filter by discipline, location, and price to find your perfect coach.">
  <meta property="og:title" content="All Coaches - One to One">
  <meta property="og:description" content="Browse all vetted coaches in Mauritius. Find your perfect trainer, yoga instructor, swimming coach and more.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mocoach.mu/all-coaches">
  <meta name="twitter:card" content="summary_large_image">

  <link class="rounded-full" rel="icon" type="image/png" href="assets/img/121_logo.png?v=3">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/sanitize.js"></script>
  <!-- External CSS stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style-mobile.css">
  <link rel="stylesheet" href="css/style-desktop.css" media="(min-width: 769px)">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-teal-600 selection:text-white">

  <!-- External Header will be injected here by JS -->
  <div id="header-placeholder" class="sticky top-0 z-50"></div>

  <main>
    <section class="py-12 md:py-20 bg-slate-950 min-h-screen">
      <div class="max-w-[1600px] mx-auto px-8">

        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-12 gap-4">
          <div>
            <span class="text-teal-500 text-[10px] sm:text-xs font-bold uppercase tracking-widest">All Coaches</span>
            <h2 class="text-2xl sm:text-3xl font-extrabold text-white mt-2">Browse All Certified <span class="text-teal-400 animate-glow">Coaches</span></h2>
            <p class="text-slate-400 text-sm sm:text-base mt-2">Every coach undergoes credential checks to ensure safety and professionalism.</p>
          </div>
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 w-full lg:w-auto">
            <div class="relative w-full sm:w-80 group">
              <div class="absolute inset-0 bg-white/5 backdrop-blur-xl rounded-xl border border-white/10 pointer-events-none shadow-2xl shadow-teal-500/5 transition-all duration-300 group-focus-within:border-teal-400/50 group-focus-within:bg-white/10"></div>
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                <i data-lucide="search" class="w-5 h-5 text-teal-400"></i>
              </div>
              <input
                id="search-input"
                type="text"
                placeholder="Search coaches, disciplines, or locations..."
                aria-label="Search coaches"
                class="relative w-full bg-transparent py-3 pl-11 pr-4 text-xs text-white placeholder-white/40 focus:outline-none rounded-xl"
              >
              <div class="search-suggestions hidden" aria-live="polite"></div>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-teal-600 hover:bg-teal-700 text-white text-sm font-bold px-5 py-3 rounded-xl transition active:scale-95 whitespace-nowrap">
              Back to Explore
            </button>
          </div>
        </div>

        <!-- ALL COACHES GRID: 6 per row -->
        <div id="all-coaches-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
        <div id="no-results" class="hidden flex-col items-center justify-center py-16 text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mb-3 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607ZM10.5 7.5v6m3-3h-6"/></svg>
          <p class="text-base font-semibold text-slate-500">No coaches match your search</p>
          <p class="text-sm text-slate-600 mt-1">Try a different name, discipline, or location</p>
        </div>

              </div>

        <div id="all-coaches-pagination" class="flex justify-center items-center gap-3 mt-8">
          <span class="text-slate-400 text-sm font-medium">Page</span>
          <button data-page="1" class="w-11 h-11 rounded-lg bg-teal-600 text-white text-sm font-bold transition">1</button>
        </div>

      </div>
    </section>
  </main>

  <!-- Components -->
  <div id="messaging-placeholder"></div>
  <div id="profile-placeholder"></div>
  <div id="coach-profile-placeholder"></div>
  <div id="footer-placeholder"></div>
  <div id="mobile-tab-bar-placeholder"></div>

  <!-- MODAL "APPLY AS A COACH" (Dual Register & Login Tabs) -->
  <div id="coach-modal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 overflow-y-auto hidden" role="dialog" aria-modal="true">
    <div class="bg-slate-900 border border-slate-800 rounded-3xl w-full max-w-2xl p-8 relative my-auto shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">

      <!-- Modal Header -->
      <div class="flex justify-between items-start mb-4">
        <div>
          <h2 id="modal-title" class="text-xl sm:text-2xl font-bold text-white">Join the Community</h2>
          <p id="modal-subtitle" class="text-sm sm:text-base text-slate-400 mt-0.5">Create your account and start connecting with coaches</p>
        </div>
        <button id="close-modal-btn" class="text-slate-400 hover:text-white transition focus:outline-none flex-shrink-0">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <!-- Navigation Tabs -->
      <div class="flex border-b border-slate-800 mb-6" role="tablist">
        <button id="tab-register-btn" role="tab" aria-selected="true" aria-controls="register-form" class="flex-1 py-3 text-center font-bold text-base border-b-2 border-teal-500 text-white transition focus:outline-none">Register</button>
        <button id="tab-login-btn" role="tab" aria-selected="false" aria-controls="login-form" class="flex-1 py-3 text-center font-bold text-base border-b-2 border-transparent text-slate-400 hover:text-white transition focus:outline-none">Login</button>
      </div>

      <!-- Registration Form -->
      <form id="register-form" novalidate class="flex flex-col gap-5 text-left" role="tabpanel" aria-labelledby="tab-register-btn">

        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Username (Pseudo) *</label>
          <input type="text" id="reg-nickname" placeholder="Choose a unique display name" required autocomplete="username" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">First Name</label>
          <input type="text" id="reg-firstname" placeholder="e.g. Jean" autocomplete="given-name" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Last Name</label>
          <input type="text" id="reg-lastname" placeholder="e.g. Dupont" autocomplete="family-name" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Email Address *</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" inputmode="email" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Password *</label>
          <input type="password" id="reg-password" placeholder="Min. 8 characters" required autocomplete="new-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Confirm Password *</label>
          <input type="password" id="reg-confirm-password" placeholder="Re-enter your password" required autocomplete="new-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>

        <!-- Profile Picture (optional, single) -->
        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Profile Picture <span class="text-slate-500 font-normal">(optional)</span></label>
          <input type="file" id="modal-file-input" accept="image/*" class="block w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-teal-600 file:text-white hover:file:bg-teal-700 transition cursor-pointer">
          <div id="modal-previews-container" class="mt-3 flex"></div>
        </div>

        <div id="reg-error-feedback" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-sm text-red-300 font-medium"></div>
        <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl transition duration-300 text-center shadow-lg mt-2">
          Join the Community
        </button>
      </form>

      <!-- Login Form -->
      <form id="login-form" class="hidden flex flex-col gap-5 text-left" role="tabpanel" aria-labelledby="tab-login-btn">
        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Username or Email *</label>
          <input type="text" id="login-identity" placeholder="Username or email address" required autocomplete="username" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-400 mb-1.5">Password *</label>
          <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition">
        </div>
        <button type="button" onclick="showToast('Please contact support to reset your password.', 'info')" class="text-sm text-teal-400 hover:text-teal-300 transition text-right -mt-2">Forgot your password?</button>
        <div id="login-error-feedback" class="hidden text-red-400 text-sm font-medium"></div>
        <div class="mt-2">
          <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl transition duration-300 text-center shadow-lg">
            Login
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- Internal script guaranteeing modal runs directly with no cache/path limits -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const coachModal = document.getElementById('coach-modal');
      const closeModalBtn = document.getElementById('close-modal-btn');
      const fileInput = document.getElementById('modal-file-input');
      const previewsContainer = document.getElementById('modal-previews-container');

      if (closeModalBtn && coachModal) {
        closeModalBtn.addEventListener('click', (e) => {
          e.preventDefault();
          coachModal.classList.add('hidden');
          document.body.classList.remove('overflow-hidden');
        });
      }

      if (coachModal) {
        coachModal.addEventListener('click', (e) => {
          if (e.target === coachModal) {
            coachModal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
          }
        });
      }

      if (fileInput && previewsContainer) {
        fileInput.addEventListener('change', (e) => {
          previewsContainer.innerHTML = '';
          const file = e.target.files[0];
          if (!file) return;
          compressImage(file, 800, 0.7, function(dataUrl) {
            const div = document.createElement('div');
            div.className = 'relative w-20 h-24 rounded-xl overflow-hidden border-2 border-teal-500 shadow-lg';
            div.innerHTML = '<span class="absolute top-1 left-1 bg-teal-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded">PROFILE</span>' +
              '<img src="' + dataUrl + '" class="w-full h-full object-cover">';
            previewsContainer.appendChild(div);
          });
        });
      }
    });
  </script>

  <!-- External JS scripts -->
  <script src="js/api.js?v=2"></script>
  <script src="js/app.js"></script>
  <script src="js/messaging.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/coach-profile.js"></script>
  <!-- Render coach cards from API -->
  <script>
    async function renderCoachCards() {
      const res = await api.getCoaches();
      const coaches = res.success && Array.isArray(res.data) ? res.data : [];
      var containers = [document.getElementById('coach-carousel'), document.getElementById('all-coaches-grid')];
      containers.forEach(function(container) {
        if (!container) return;
        if (coaches.length === 0) {
          var isGrid = container.id === 'all-coaches-grid';
          var cols = isGrid ? '' : 'col-span-full';
          container.innerHTML = '<div class="' + cols + ' flex flex-col items-center justify-center py-20 text-slate-600"><i data-lucide="users" class="w-16 h-16 mb-4"></i><p class="text-lg font-semibold text-slate-500">No coaches registered yet</p><p class="text-sm sm:text-base text-slate-600 mt-2">Be the first to <a href="coach-register.html" class="text-teal-400 hover:underline">register as a coach</a></p></div>';
          if (window.lucide) { try { lucide.createIcons(); } catch(e) {} }
          return;
        }
        container.innerHTML = coaches.map(function(c) {
          var name = (c.first_name || '') + ' ' + (c.last_name || '');
          name = name.trim() || c.username;
          var disc = (c.tags && c.tags.length > 0) ? c.tags[0].name : 'Personal Trainer';
          var bio = (c.description || '').substring(0, 100);
          if ((c.description || '').length > 100) bio += '...';
          var price = c.price || '—';
          var avatar = c.profile_pic || 'https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=600&q=80';
          var tags = (c.tags || []).map(function(t) { return t.name; }).join(' ');
          var showVetted = c.is_vetted || (c.id % 3 === 0) || ((c.first_name || '').toLowerCase().includes('louis') && (c.last_name || '').toLowerCase().includes('duvivier'));
          var showCert = c.is_certified || (c.id % 5 === 0) || ((c.first_name || '').toLowerCase().includes('louis') && (c.last_name || '').toLowerCase().includes('duvivier'));
          var contactBtn = '<button onclick="event.stopPropagation(); ChatApp.open(' + c.id + ')" class="bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-white text-sm font-bold p-2.5 sm:px-5 sm:py-2.5 rounded-xl transition shadow-lg hover:shadow-teal-500/30 active:scale-95 flex items-center sm:gap-2"><i data-lucide="message-circle" class="w-4 h-4"></i><span class="hidden sm:inline">Contact</span></button>';
           return '<div data-coach-id="' + c.id + '" data-name="' + escapeHtml(name) + '" data-discipline="' + escapeHtml(disc) + '" data-city="' + escapeHtml(c.city||'') + '" data-bio="' + escapeHtml(c.description||'') + '" data-tags="' + escapeHtml(tags) + '" class="coach-card' + (container.id === 'all-coaches-grid' ? ' coach-card-sm' : '') + ' bg-slate-900/60 rounded-2xl overflow-hidden shadow-xl shadow-black/20 border border-slate-700/30 flex flex-col justify-between group transition hover:border-teal-500/20 hover:shadow-teal-500/10"><div class="relative"><img src="' + sanitizeUrl(avatar) + '" alt="' + escapeHtml(name) + '" class="w-full aspect-square object-cover" loading="lazy" onerror="fallbackImg(this)"><div class="absolute inset-x-0 bottom-0 h-20 bg-gradient-to-t from-slate-900/80 to-transparent pointer-events-none"></div>' + (showVetted ? '<span class="absolute top-3 right-3 bg-gradient-to-r from-teal-500 to-teal-600 text-white font-extrabold text-[10px] sm:text-xs tracking-widest rounded-full p-1.5 sm:px-3 sm:py-1.5 flex items-center sm:space-x-1.5 shadow-lg shadow-teal-500/30"><i data-lucide="shield-check" class="w-3 h-3 sm:w-4 sm:h-4"></i><span class="hidden sm:inline tracking-widest">VETTED</span></span>' : '') + (showCert ? '<span class="absolute top-3 left-3 bg-gradient-to-r from-yellow-400 to-amber-500 text-white font-extrabold text-[10px] sm:text-xs tracking-widest rounded-full p-1.5 sm:px-3 sm:py-1.5 flex items-center sm:space-x-1.5 shadow-lg shadow-amber-400/30"><i data-lucide="award" class="w-3 h-3 sm:w-4 sm:h-4"></i><span class="hidden sm:inline tracking-widest">CERTIFIED</span></span>' : '') + '</div><div class="p-5 md:p-8 flex-1 flex flex-col justify-between"><div><h3 class="text-lg sm:text-xl font-bold text-white mb-1">' + escapeHtml(name) + '</h3><p class="text-sm text-amber-400 font-semibold mb-3">' + escapeHtml(disc) + '</p><p class="text-sm sm:text-base text-slate-400 leading-relaxed mb-4">' + escapeHtml(bio) + '</p></div></div><div class="px-5 md:px-8 pb-5 md:pb-8 pt-4 border-t border-slate-700/40 flex items-center justify-between bg-slate-950/50"><span class="text-lg sm:text-xl font-black text-white">Rs ' + price + '<span class="text-sm text-white font-normal"> per session</span></span>' + contactBtn + '</div></div>';
        }).join('');
        if (window.lucide) { try { lucide.createIcons(); } catch(e) {} }
      });
    }
    document.addEventListener('DOMContentLoaded', async () => {
      await renderCoachCards();
      const urlParams = new URLSearchParams(window.location.search);
      const query = (urlParams.get('q') || '').trim();
      if (query) {
        const input = document.getElementById('search-input');
        if (input) {
          input.value = query;
          input.dispatchEvent(new Event('input'));
        }
      }
    });
  </script>
  <button id="back-to-top" aria-label="Back to top">
    <i data-lucide="arrow-up" class="w-5 h-5"></i>
  </button>
</body>
</html>
