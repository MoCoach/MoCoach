<div id="profile-view" class="relative bg-[#020617] min-h-screen py-12 overflow-hidden hidden">
  
  <!-- Container for generating twinkling stars in the background -->
  <div id="stars-container" class="absolute inset-0 pointer-events-none overflow-hidden z-0"></div>

  <div class="max-w-4xl mx-auto px-6 relative z-10">
    
    <!-- Back button -->
    <a href="#" id="profile-back-btn" class="inline-flex items-center space-x-2 text-slate-400 hover:text-white mb-8 text-base transition group">
      <i data-lucide="arrow-left" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i>
      <span>Back to Home</span>
    </a>

    <!-- Profile header (Avatar, Username, and Bio) -->
    <div id="profile-header-card" class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-5 md:p-8 backdrop-blur-md shadow-[0_4px_30px_rgba(30,58,138,0.15)] mb-6 relative overflow-hidden">
      
      <!-- Background tactical layout 1 -->
      <svg class="absolute right-6 top-1/2 -translate-y-1/2 w-44 h-44 text-teal-500/5 pointer-events-none hidden md:block" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M 15 25 L 25 35 M 25 25 L 15 35" />
        <path d="M 45 15 L 55 25 M 55 15 L 45 25" />
        <path d="M 20 38 Q 40 50 50 30" stroke-dasharray="2,2" />
        <path d="M 46 28 L 51 30 L 49 35" fill="currentColor" />
        <circle cx="55" cy="55" r="8" stroke-dasharray="3,3" />
        <circle cx="55" cy="55" r="2" fill="currentColor" />
        <line x1="5" y1="95" x2="95" y2="95" />
        <line x1="5" y1="95" x2="5" y2="5" />
        <line x1="5" y1="50" x2="95" y2="50" stroke-dasharray="4,4" />
      </svg>
      
      <!-- Dynamically populated by profile.js -->
    </div>

    <!-- Personal information -->
    <div id="profile-personal-card" class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-5 md:p-8 backdrop-blur-md shadow-[0_4px_30px_rgba(30,58,138,0.15)] mb-6 relative overflow-hidden">
      
      <!-- Background tactical layout 2 -->
      <svg class="absolute right-6 bottom-6 w-36 h-36 text-amber-500/5 pointer-events-none hidden md:block" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M 10 80 A 70 70 0 0 1 80 10" stroke-dasharray="3,3" />
        <path d="M 75 15 L 85 25 M 85 15 L 75 25" />
        <circle cx="45" cy="45" r="12" />
        <circle cx="45" cy="45" r="6" />
        <circle cx="45" cy="45" r="1.5" fill="currentColor" />
        <line x1="10" y1="90" x2="90" y2="90" />
        <line x1="15" y1="85" x2="15" y2="95" />
        <line x1="30" y1="85" x2="30" y2="95" />
        <line x1="45" y1="85" x2="45" y2="95" />
        <line x1="60" y1="85" x2="60" y2="95" />
        <line x1="75" y1="85" x2="75" y2="95" />
      </svg>

      <div class="flex items-center space-x-3 mb-6 relative z-10">
        <div class="w-10 h-10 rounded-xl bg-teal-500/10 text-teal-400 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5"></i>
        </div>
        <div>
          <h2 class="text-lg sm:text-xl font-extrabold text-white">Personal Information</h2>
          <p class="text-sm text-slate-300 font-medium mt-0.5">Manage your profile details</p>
        </div>
      </div>
      <div id="profile-personal-form" class="relative z-10">
        <!-- Dynamically populated by profile.js -->
      </div>
    </div>

    <!-- Security and password -->
    <div id="profile-security-card" class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-5 md:p-8 backdrop-blur-md shadow-[0_4px_30px_rgba(30,58,138,0.15)] mb-6 relative overflow-hidden">
      
      <!-- Background tactical layout 3 -->
      <svg class="absolute right-6 bottom-6 w-32 h-32 text-amber-500/5 pointer-events-none hidden md:block" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="50" cy="50" r="40" />
        <circle cx="50" cy="50" r="25" stroke-dasharray="2,2" />
        <line x1="10" y1="50" x2="90" y2="50" />
        <line x1="50" y1="10" x2="50" y2="90" />
        <path d="M 25 25 Q 50 15 75 25" stroke-dasharray="3,3" />
        <path d="M 71 20 L 76 25 L 71 28" fill="currentColor" />
      </svg>

      <div class="flex items-center space-x-3 mb-6 relative z-10">
        <div class="w-10 h-10 rounded-xl bg-amber-500/10 text-amber-400 flex items-center justify-center">
          <i data-lucide="shield" class="w-5 h-5"></i>
        </div>
        <div>
          <h2 class="text-lg sm:text-xl font-extrabold text-white">Security</h2>
          <p class="text-sm text-slate-300 font-medium mt-0.5">Update your password</p>
        </div>
      </div>
      <div id="profile-security-form" class="relative z-10">
        <!-- Dynamically populated by profile.js -->
      </div>
    </div>



  </div>

  <!-- Notification toasts -->
  <div id="profile-toast-container" class="fixed top-24 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>
</div>
