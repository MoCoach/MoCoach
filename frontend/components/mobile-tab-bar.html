<!-- Mobile Bottom Tab Bar (visible only on mobile, fixed at bottom) -->
<div id="mobile-tab-bar" class="lg:hidden fixed bottom-0 inset-x-0 z-[55] bg-slate-950 border-t border-slate-800/80 safe-bottom">
    <!-- Home -->
    <button id="tab-bar-home" class="tab-bar-item active flex flex-col items-center justify-center gap-1 text-teal-400 relative" aria-label="Home">
      <i data-lucide="home" class="w-6 h-6"></i>
      <span class="text-[11px] font-semibold tracking-wide">Home</span>
    </button>
    <!-- Explore Coaches -->
    <button id="tab-bar-explore" class="tab-bar-item flex flex-col items-center justify-center gap-1 text-slate-500 relative" aria-label="Explore Coaches">
      <i data-lucide="compass" class="w-6 h-6"></i>
      <span class="text-[11px] font-semibold tracking-wide">Explore</span>
    </button>
    <!-- Chat / Messages -->
    <button id="tab-bar-chat" class="tab-bar-item flex flex-col items-center justify-center gap-1 text-slate-500 relative" aria-label="Messages">
      <i data-lucide="message-circle" class="w-6 h-6"></i>
      <span class="text-[11px] font-semibold tracking-wide">Chat</span>
    </button>
    <!-- Profile -->
    <button id="tab-bar-profile" class="tab-bar-item flex flex-col items-center justify-center gap-1 text-slate-500 relative" aria-label="Profile">
      <div id="tab-bar-avatar" class="w-7 h-7 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center overflow-hidden">
        <i data-lucide="user" class="w-4 h-4"></i>
      </div>
      <span id="tab-bar-username" class="text-[11px] font-semibold tracking-wide">Profile</span>
    </button>
</div>
