<div id="messaging-overlay" class="messaging-overlay fixed inset-0 z-[60] hidden">
  <div class="messaging-backdrop absolute inset-0 bg-slate-950/70 backdrop-blur-sm"></div>

  <div class="messaging-panel fixed top-0 right-0 h-full w-full md:w-[600px] lg:w-[720px] bg-slate-950 border-l border-slate-800 shadow-2xl flex flex-col z-10">
    <div class="flex items-center justify-between px-5 py-3 border-b border-slate-800 bg-slate-950/95 flex-shrink-0">
      <div class="flex items-center space-x-3">
        <img src="assets/img/mocoach-logo.png" alt="One to One" class="h-7 w-auto">
        <span class="text-lg font-bold text-white">Messages</span>
      </div>
      <button id="msg-close-btn" class="text-slate-400 hover:text-white transition p-2 rounded-lg hover:bg-slate-800" aria-label="Close messaging">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <div id="msg-sidebar" class="w-full md:w-[320px] lg:w-[340px] border-r border-slate-800 flex flex-col flex-shrink-0">
        <div class="p-3">
          <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none"></i>
            <input id="msg-search" type="text" placeholder="Search conversations..." class="w-full bg-slate-900 border border-slate-800 rounded-xl py-2.5 pl-10 pr-4 text-base text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500 transition">
          </div>
        </div>
        <div id="msg-conversation-list" class="flex-1 overflow-y-auto no-scrollbar"></div>
      </div>

      <div id="msg-chat-panel" class="hidden md:flex flex-1 flex-col min-w-0">
        <div id="msg-chat-header" class="px-5 py-3 border-b border-slate-800 flex items-center space-x-3 bg-slate-950/50 flex-shrink-0"></div>

        <div id="msg-messages" class="flex-1 overflow-y-auto p-4 sm:p-5 space-y-3 no-scrollbar hidden"></div>

        <div id="msg-empty-state" class="flex-1 flex flex-col items-center justify-center text-slate-500 px-8">
          <i data-lucide="message-circle" class="w-16 h-16 mb-4 text-slate-700"></i>
          <p class="text-lg font-semibold text-slate-400">Select a conversation</p>
          <p class="text-sm text-slate-600 text-center mt-1">Choose a chat from the sidebar to start messaging</p>
        </div>

        <div id="msg-input-area" class="px-4 py-3 border-t border-slate-800 bg-slate-950/50 flex-shrink-0 hidden">
          <div class="flex items-center space-x-2">
            <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl py-2.5 px-4 text-base text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500 transition">
            <button id="msg-send-btn" class="bg-teal-600 hover:bg-teal-700 text-white rounded-xl p-2.5 transition disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0" aria-label="Send message">
              <i data-lucide="send" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
