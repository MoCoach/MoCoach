<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - MoCoach</title>
  <link rel="icon" type="image/png" href="assets/img/favicon_MoCoach_4.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-tab { cursor: pointer; }
    .admin-tab.active { border-bottom-color: #3b82f6; color: #fff; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-blue-600 selection:text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center space-x-4">
        <img src="assets/img/mocoach-logo.png" alt="MoCoach" class="h-12 w-auto">
        <div>
          <h1 class="text-2xl font-extrabold text-white">Admin Panel</h1>
          <p id="admin-greeting" class="text-sm text-slate-400"></p>
        </div>
      </div>
      <div class="flex items-center space-x-3">
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-bold px-4 py-2.5 rounded-xl transition">Back to Site</a>
        <button id="admin-logout-btn" class="bg-red-950/40 border border-red-900/50 hover:bg-red-900/40 text-red-400 text-sm font-bold px-4 py-2.5 rounded-xl transition">Logout</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-slate-800 mb-6">
      <button class="admin-tab active text-white font-bold px-6 py-3 border-b-2 border-blue-500" data-tab="coaches">Coaches</button>
      <button class="admin-tab text-slate-400 font-bold px-6 py-3 border-b-2 border-transparent hover:text-white" data-tab="customers">Customers</button>
      <button class="admin-tab text-slate-400 font-bold px-6 py-3 border-b-2 border-transparent hover:text-white" data-tab="messages">Messages</button>
    </div>

    <!-- Coaches Tab -->
    <div id="admin-coaches-tab" class="admin-tab-content">
      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-6 backdrop-blur-md">
        <h2 class="text-xl font-extrabold text-white mb-4">Coach Management</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-800">
                <th class="text-left py-3 px-2">Name</th>
                <th class="text-left py-3 px-2">Username</th>
                <th class="text-left py-3 px-2">Email</th>
                <th class="text-left py-3 px-2">City</th>
                <th class="text-center py-3 px-2">Verified</th>
                <th class="text-center py-3 px-2">Certified</th>
                <th class="text-center py-3 px-2">Blocked</th>
                <th class="text-center py-3 px-2">Msg Block</th>
                <th class="text-center py-3 px-2">Photos</th>
              </tr>
            </thead>
            <tbody id="admin-coaches-body"></tbody>
          </table>
        </div>
        <p id="admin-coaches-empty" class="text-center text-slate-500 py-8 hidden">No coaches registered yet.</p>
      </div>
    </div>

    <!-- Customers Tab -->
    <div id="admin-customers-tab" class="admin-tab-content hidden">
      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-6 backdrop-blur-md">
        <h2 class="text-xl font-extrabold text-white mb-4">Customer Management</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-800">
                <th class="text-left py-3 px-2">Username</th>
                <th class="text-left py-3 px-2">Email</th>
                <th class="text-center py-3 px-2">Blocked</th>
                <th class="text-center py-3 px-2">Msg Block</th>
              </tr>
            </thead>
            <tbody id="admin-customers-body"></tbody>
          </table>
        </div>
        <p id="admin-customers-empty" class="text-center text-slate-500 py-8 hidden">No customers registered yet.</p>
      </div>
    </div>

    <!-- Messages Tab -->
    <div id="admin-messages-tab" class="admin-tab-content hidden">
      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-6 backdrop-blur-md">
        <h2 class="text-xl font-extrabold text-white mb-4">Message Moderation</h2>
        <div id="admin-conversations-list" class="space-y-3">
          <!-- Filled by JS -->
        </div>
        <p id="admin-messages-empty" class="text-center text-slate-500 py-8">No conversations found.</p>
      </div>
    </div>
  </div>

  <script>
    const AdminApp = {
      init() {
        const auth = JSON.parse(sessionStorage.getItem('mocoach_auth') || 'null');
        if (!auth || auth.role !== 'admin') {
          window.location.href = 'index.html';
          return;
        }
        document.getElementById('admin-greeting').textContent = `Logged in as ${auth.username}`;
        this.bindEvents();
        this.renderCoaches();
        this.renderCustomers();
        this.renderConversations();
      },

      bindEvents() {
        document.getElementById('admin-logout-btn').addEventListener('click', () => {
          sessionStorage.removeItem('mocoach_auth');
          window.location.href = 'index.html';
        });

        document.querySelectorAll('.admin-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.admin-tab').forEach(b => {
              b.classList.remove('active');
              b.classList.add('text-slate-400');
              b.style.borderBottomColor = 'transparent';
            });
            btn.classList.add('active');
            btn.classList.remove('text-slate-400');
            btn.style.borderBottomColor = '#3b82f6';

            document.querySelectorAll('.admin-tab-content').forEach(t => t.classList.add('hidden'));
            const tab = document.getElementById(`admin-${btn.dataset.tab}-tab`);
            if (tab) tab.classList.remove('hidden');
          });
        });
      },

      getAdminData() {
        try { return JSON.parse(localStorage.getItem('mocoach_admin_data') || '{"coaches":{},"customers":{}}'); }
        catch { return { coaches: {}, customers: {} }; }
      },

      saveAdminData(data) {
        localStorage.setItem('mocoach_admin_data', JSON.stringify(data));
      },

      getCoaches() {
        try { return JSON.parse(localStorage.getItem('mocoach_coaches') || '[]'); }
        catch { return []; }
      },

      getUsers() {
        try { return JSON.parse(localStorage.getItem('mocoach_users') || '[]'); }
        catch { return []; }
      },

      renderCoaches() {
        const tbody = document.getElementById('admin-coaches-body');
        const coaches = this.getCoaches();
        const admin = this.getAdminData();
        const empty = document.getElementById('admin-coaches-empty');

        if (coaches.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');

        tbody.innerHTML = coaches.map((c, i) => {
          const settings = admin.coaches[c.username] || {};
          const isVetted = settings.is_vetted || false;
          const isCertified = settings.is_certified || false;
          const isBlocked = settings.is_blocked || false;
          const msgBlocked = settings.messaging_blocked || false;
          return `
            <tr class="border-b border-slate-800/50 hover:bg-slate-800/30">
              <td class="py-3 px-2 text-white font-semibold">${this._esc(c.firstName)} ${this._esc(c.lastName)}</td>
              <td class="py-3 px-2 text-slate-300">${this._esc(c.username)}</td>
              <td class="py-3 px-2 text-slate-300">${this._esc(c.email)}</td>
              <td class="py-3 px-2 text-slate-300">${this._esc(c.city)}</td>
              <td class="py-3 px-2 text-center">
                <input type="checkbox" ${isVetted ? 'checked' : ''} onchange="AdminApp.toggleCoachFlag('${c.username}', 'is_vetted', this.checked)" class="w-4 h-4 rounded accent-blue-600">
              </td>
              <td class="py-3 px-2 text-center">
                <input type="checkbox" ${isCertified ? 'checked' : ''} onchange="AdminApp.toggleCoachFlag('${c.username}', 'is_certified', this.checked)" class="w-4 h-4 rounded accent-emerald-600">
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleCoachFlag('${c.username}', 'is_blocked')" class="px-3 py-1 rounded-lg text-xs font-bold ${isBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'} transition">${isBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleCoachFlag('${c.username}', 'messaging_blocked')" class="px-3 py-1 rounded-lg text-xs font-bold ${msgBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'} transition">${msgBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.removeCoachPhotos('${c.username}')" class="text-xs text-red-400 hover:text-red-300 font-semibold">Remove Photos</button>
              </td>
            </tr>
          `;
        }).join('');
      },

      toggleCoachFlag(username, flag, value) {
        const admin = this.getAdminData();
        if (!admin.coaches[username]) admin.coaches[username] = {};
        if (value !== undefined) {
          admin.coaches[username][flag] = value;
        } else {
          admin.coaches[username][flag] = !admin.coaches[username][flag];
        }
        this.saveAdminData(admin);
        this.renderCoaches();
      },

      removeCoachPhotos(username) {
        if (!confirm(`Remove all photos for ${username}?`)) return;
        const coaches = this.getCoaches();
        const coach = coaches.find(c => c.username === username);
        if (coach) {
          coach.avatar = '';
          coach.gallery = [];
          localStorage.setItem('mocoach_coaches', JSON.stringify(coaches));
          this.showToast('Photos removed', 'success');
          this.renderCoaches();
        }
      },

      renderCustomers() {
        const tbody = document.getElementById('admin-customers-body');
        const users = this.getUsers();
        const admin = this.getAdminData();
        const empty = document.getElementById('admin-customers-empty');

        if (users.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');

        tbody.innerHTML = users.map((u, i) => {
          const settings = admin.customers[u.username] || {};
          const isBlocked = settings.is_blocked || false;
          const msgBlocked = settings.messaging_blocked || false;
          return `
            <tr class="border-b border-slate-800/50 hover:bg-slate-800/30">
              <td class="py-3 px-2 text-white font-semibold">${this._esc(u.username)}</td>
              <td class="py-3 px-2 text-slate-300">${this._esc(u.email)}</td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleCustomerFlag('${u.username}', 'is_blocked')" class="px-3 py-1 rounded-lg text-xs font-bold ${isBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'} transition">${isBlocked ? 'Blocked' : 'Active'}</button>
              </td>
              <td class="py-3 px-2 text-center">
                <button onclick="AdminApp.toggleCustomerFlag('${u.username}', 'messaging_blocked')" class="px-3 py-1 rounded-lg text-xs font-bold ${msgBlocked ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400'} transition">${msgBlocked ? 'Blocked' : 'Active'}</button>
              </td>
            </tr>
          `;
        }).join('');
      },

      toggleCustomerFlag(username, flag) {
        const admin = this.getAdminData();
        if (!admin.customers[username]) admin.customers[username] = {};
        admin.customers[username][flag] = !admin.customers[username][flag];
        this.saveAdminData(admin);
        this.renderCustomers();
      },

      renderConversations() {
        const container = document.getElementById('admin-conversations-list');
        const empty = document.getElementById('admin-messages-empty');
        const raw = localStorage.getItem('mocoach_chats');

        if (!raw) {
          container.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }

        try {
          const conversations = JSON.parse(raw);
          if (!conversations.length) {
            container.innerHTML = '';
            empty.classList.remove('hidden');
            return;
          }
          empty.classList.add('hidden');

          container.innerHTML = conversations.map(conv => {
            const coachName = conv.coach?.name || 'Unknown Coach';
            const msgCount = conv.messages?.length || 0;
            const coachId = conv.coach?.id || conv.id?.replace('conv-', '') || '';
            return `
              <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl overflow-hidden">
                <button onclick="AdminApp.toggleConv('${conv.id}')" class="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-800/30 transition">
                  <div class="flex items-center space-x-3">
                    <i data-lucide="message-circle" class="w-5 h-5 text-blue-400"></i>
                    <span class="font-semibold text-white">${this._esc(coachName)}</span>
                    <span class="text-xs text-slate-500">(${msgCount} messages)</span>
                  </div>
                  <i id="chevron-${conv.id}" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
                </button>
                <div id="conv-body-${conv.id}" class="hidden border-t border-slate-800/50 px-5 py-3 space-y-2 max-h-80 overflow-y-auto">
                  ${(conv.messages || []).map(msg => `
                    <div class="flex items-start justify-between gap-2 group">
                      <div class="flex-1">
                        <p class="text-xs text-slate-500">${msg.senderId === 'user' ? 'Customer' : this._esc(coachName)} <span class="text-slate-600">· ${new Date(msg.timestamp).toLocaleString()}</span></p>
                        <p class="text-sm text-slate-200 mt-0.5">${this._esc(msg.text)}</p>
                      </div>
                      <button onclick="AdminApp.deleteMessage('${conv.id}', '${msg.id}')" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 p-1 transition flex-shrink-0" title="Delete message">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }).join('');
          if (window.lucide) lucide.createIcons();
        } catch (e) {
          container.innerHTML = '<p class="text-slate-500 text-center py-4">Error loading conversations.</p>';
        }
      },

      toggleConv(id) {
        const body = document.getElementById(`conv-body-${id}`);
        const chevron = document.getElementById(`chevron-${id}`);
        if (!body) return;
        body.classList.toggle('hidden');
        if (chevron) {
          chevron.style.transform = body.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
      },

      deleteMessage(convId, msgId) {
        if (!confirm('Delete this message?')) return;
        try {
          const conversations = JSON.parse(localStorage.getItem('mocoach_chats') || '[]');
          const conv = conversations.find(c => c.id === convId);
          if (conv) {
            conv.messages = conv.messages.filter(m => m.id !== msgId);
            localStorage.setItem('mocoach_chats', JSON.stringify(conversations));
          }
          this.renderConversations();
          this.showToast('Message deleted', 'success');
        } catch (e) {
          this.showToast('Error deleting message', 'error');
        }
      },

      showToast(msg, type) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-6 right-6 z-50 ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'} text-white text-sm font-medium px-5 py-3 rounded-xl shadow-lg flex items-center space-x-2`;
        toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i><span>${msg}</span>`;
        document.body.appendChild(toast);
        if (window.lucide) lucide.createIcons();
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
      },

      _esc(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      },
    };

    document.addEventListener('DOMContentLoaded', () => AdminApp.init());
  </script>
</body>
</html>
