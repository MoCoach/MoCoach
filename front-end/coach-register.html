<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register as a Coach - MoCoach</title>
  <link rel="icon" type="image/png" href="assets/img/favicon_MoCoach_4.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-blue-600 selection:text-white">
  <div id="header-placeholder" class="sticky top-0 z-50"></div>

  <main class="py-16">
    <div class="max-w-2xl mx-auto px-6">
      <a href="index.html" class="inline-flex items-center space-x-2 text-slate-400 hover:text-white mb-8 text-base transition group">
        <i data-lucide="arrow-left" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i>
        <span>Back to Home</span>
      </a>

      <div class="bg-[#151d30]/90 border border-slate-800/80 rounded-3xl p-8 backdrop-blur-md shadow-[0_4px_30px_rgba(30,58,138,0.15)]">
        <div class="flex items-center space-x-3 mb-6">
          <div class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-400 flex items-center justify-center">
            <i data-lucide="award" class="w-5 h-5"></i>
          </div>
          <div>
            <h1 class="text-2xl font-extrabold text-white">Register as a Coach</h1>
            <p class="text-sm text-slate-300 mt-0.5">Join our network of verified coaches in Mauritius</p>
          </div>
        </div>

        <div class="bg-amber-500/10 border border-amber-500/30 rounded-xl p-4 mb-6">
          <div class="flex items-start space-x-3">
            <i data-lucide="info" class="w-5 h-5 text-amber-400 flex-shrink-0 mt-0.5"></i>
            <div>
              <p class="text-sm font-semibold text-amber-300">KYC (Know Your Customer)</p>
              <p class="text-sm text-amber-200/80 mt-1">Please send a copy of your ID and any relevant qualifications to <span class="font-bold text-amber-200">kyc@mocoach.mu</span></p>
            </div>
          </div>
        </div>

        <form id="coach-register-form" class="flex flex-col gap-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-semibold text-slate-400 mb-1.5">First Name *</label>
              <input type="text" id="cr-firstname" required placeholder="ex: Jean" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-400 mb-1.5">Last Name *</label>
              <input type="text" id="cr-lastname" required placeholder="ex: Dupont" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Username *</label>
            <input type="text" id="cr-username" required placeholder="ex: jeandupont" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Email Address *</label>
            <input type="email" id="cr-email" required placeholder="ex: jean@example.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Location *</label>
            <select id="cr-city" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition">
              <option value="" disabled selected>Select your location</option>
            </select>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-semibold text-slate-400 mb-1.5">Password *</label>
              <input type="password" id="cr-password" required placeholder="••••••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-400 mb-1.5">Confirm Password *</label>
              <input type="password" id="cr-confirm-password" required placeholder="••••••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
            </div>
          </div>

          <hr class="border-slate-800">

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Tags / Specialties * <span class="text-slate-500 font-normal">(min 1, max 3)</span></label>
            <input type="text" id="cr-tag-search" placeholder="Search tags..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition mb-3">
            <div id="cr-tag-count" class="text-xs text-slate-500 mb-2">0 of 3 selected</div>
            <div id="cr-tag-checklist" class="max-h-64 overflow-y-auto bg-slate-950 border border-slate-800 rounded-xl p-3 space-y-1.5"></div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Price per Session (Rs) *</label>
            <input type="number" id="cr-price" min="0" required placeholder="ex: 500" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
          </div>

          <hr class="border-slate-800">

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Bio *</label>
            <textarea id="cr-bio" rows="3" required placeholder="Tell potential clients about yourself, your experience, and coaching philosophy..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition resize-none"></textarea>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Profile Photo <span class="text-slate-500 font-normal">(optional)</span></label>
            <input type="file" id="cr-photo" accept="image/*" class="block w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer">
            <div id="cr-photo-preview" class="mt-3 hidden">
              <div class="relative w-24 h-24 rounded-2xl overflow-hidden border-2 border-blue-500 shadow-lg">
                <img id="cr-photo-img" class="w-full h-full object-cover">
              </div>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-400 mb-1.5">Gallery Photos <span class="text-slate-500 font-normal">(optional, up to 7)</span></label>
            <input type="file" id="cr-gallery" accept="image/*" multiple class="block w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer">
            <div id="cr-gallery-previews" class="mt-3 grid grid-cols-4 gap-2"></div>
          </div>

          <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition duration-300 text-center shadow-lg mt-2">
            <i data-lucide="user-plus" class="w-5 h-5 inline mr-2"></i>
            Register as Coach
          </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-4">
          Already have an account?
          <a href="index.html" class="text-blue-400 hover:text-blue-300 font-semibold">Log in</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    const CITIES = [
      'Port Louis', 'Beau Bassin', 'Rose Hill', 'Quatre Bornes', 'Vacoas',
      'Phoenix', 'Curepipe', 'Ebene', 'Moka', 'Trianon', 'Pailles',
      'Coromandel', 'Albion', 'Flic en Flac', 'Tamarin', 'Black River',
      'Bambous', 'Cascavelle', 'Rivi\u00e8re Noire', 'Grand Baie',
      'Pereybere', 'Cap Malheureux', 'Trou aux Biches',
      'Pointe aux Canonniers', 'Mont Choisy', 'Goodlands', 'Grand Gaube',
      'Pamplemousses', 'Triolet', 'Terre Rouge', 'Arsenal',
      'Flacq (Centre de Flacq)', 'Belle Mare', 'Poste de Flacq',
      "Trou d'Eau Douce", 'Mah\u00e9bourg', 'Blue Bay', "Pointe d'Esny",
      'Plaine Magnien', 'Souillac', 'Chemin Grenier',
      'Rivi\u00e8re des Anguilles', 'Bel Ombre', 'Chamarel'
    ];

    const TAG_GROUPS = {
      'Sports': [
        'Football', 'Swimming', 'Hiking', 'Running', 'Yoga', 'Padel', 'Tennis',
        'Cycling', 'Mountain Biking', 'Trail Running', 'Scuba Diving', 'Snorkeling',
        'Freediving', 'Surfing', 'Kitesurfing', 'Stand Up Paddle', 'Kayaking',
        'Sailing', 'Golf', 'Boxing', 'Kickboxing', 'Muay Thai', 'MMA',
        'Brazilian Jiu-Jitsu', 'Karate', 'Taekwondo', 'Judo', 'Beach Volleyball',
        'Basketball', 'Volleyball', 'Badminton', 'Table Tennis', 'Cricket', 'Rugby',
        'Horse Riding', 'Fishing', 'Spearfishing', 'Canyoning', 'Rock Climbing',
        'Paragliding', 'Open Water Swimming'
      ],
      'Fitness & Activities': [
        'Fitness', 'Gym', 'Personal Training', 'CrossFit', 'Calisthenics',
        'Pilates', 'Zumba', 'Dance Fitness', 'Outdoor Adventure'
      ],
      'Health & Goals': [
        'Lose Weight', 'Build Muscle', 'Stay Fit', 'Improve Health',
        'Improve Endurance', 'Get Stronger', 'Improve Flexibility',
        'Improve Mobility', 'Improve Balance', 'Increase Energy',
        'Sports Performance', 'Competition Preparation', 'Beginner Friendly',
        'Learn a New Sport', 'Master a Skill', 'Rehabilitation',
        'Recover from Injury', 'Stress Relief', 'Mental Wellbeing',
        'Weight Management', 'Body Transformation', 'Toning',
        'Cardio Fitness', 'Functional Fitness', 'Core Strength',
        'Posture Improvement', 'Self Defense'
      ],
      'Coaching & Lessons': [
        'Train for a Marathon', 'Train for a Triathlon', 'Trail Running Preparation',
        'Swimming Lessons', 'Learn to Dive', 'Learn to Surf', 'Learn Tennis',
        'Learn Padel', 'Kids Coaching', 'Senior Fitness', 'Prenatal Fitness',
        'Postnatal Fitness', 'Corporate Wellness'
      ]
    };

    document.addEventListener('DOMContentLoaded', () => {
      const photoInput = document.getElementById('cr-photo');
      const photoPreview = document.getElementById('cr-photo-preview');
      const photoImg = document.getElementById('cr-photo-img');

      photoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          photoImg.src = ev.target.result;
          photoPreview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      });

      const galleryInput = document.getElementById('cr-gallery');
      const galleryPreviews = document.getElementById('cr-gallery-previews');
      const galleryLabel = document.querySelector('label[for="cr-gallery"]') || galleryInput.previousElementSibling;
      let galleryDataUrls = [];

      function renderGallery() {
        galleryPreviews.innerHTML = '';
        galleryDataUrls.forEach((url, index) => {
          const div = document.createElement('div');
          div.className = 'relative w-full aspect-square rounded-xl overflow-hidden border border-slate-700 group';
          const img = document.createElement('img');
          img.src = url;
          img.className = 'w-full h-full object-cover';
          div.appendChild(img);
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'absolute top-1 right-1 w-6 h-6 bg-red-600/80 hover:bg-red-600 text-white rounded-full flex items-center justify-center text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity';
          removeBtn.textContent = '\u00d7';
          removeBtn.addEventListener('click', () => {
            galleryDataUrls.splice(index, 1);
            renderGallery();
          });
          div.appendChild(removeBtn);
          galleryPreviews.appendChild(div);
        });
      }

      galleryInput.addEventListener('change', (e) => {
        const newFiles = [...e.target.files];
        const remaining = 7 - galleryDataUrls.length;
        if (remaining <= 0) {
          alert('Maximum 7 photos reached.');
          e.target.value = '';
          return;
        }
        if (newFiles.length > remaining) {
          alert(`You can add only ${remaining} more photo(s).`);
        }
        const filesToAdd = newFiles.slice(0, remaining);
        let pending = filesToAdd.length;
        if (pending === 0) { e.target.value = ''; return; }
        filesToAdd.forEach(file => {
          if (!file.type.startsWith('image/')) { pending--; if (pending === 0) renderGallery(); return; }
          const reader = new FileReader();
          reader.onload = (ev) => {
            galleryDataUrls.push(ev.target.result);
            pending--;
            if (pending === 0) renderGallery();
          };
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      });

      const citySelect = document.getElementById('cr-city');
      CITIES.forEach(city => {
        const opt = document.createElement('option');
        opt.value = city;
        opt.textContent = city;
        citySelect.appendChild(opt);
      });

      const tagChecklist = document.getElementById('cr-tag-checklist');
      const tagSearch = document.getElementById('cr-tag-search');
      const tagCount = document.getElementById('cr-tag-count');
      const selectedTags = new Set();

      function renderTags(filter = '') {
        tagChecklist.innerHTML = '';
        const lower = filter.toLowerCase();

        Object.entries(TAG_GROUPS).forEach(([group, tags]) => {
          const filtered = tags.filter(t => t.toLowerCase().includes(lower));
          if (filtered.length === 0) return;

          const block = document.createElement('div');
          const heading = document.createElement('p');
          heading.className = 'text-xs font-semibold text-slate-500 uppercase tracking-wider mt-3 first:mt-0 mb-1.5';
          heading.textContent = group;
          block.appendChild(heading);

          filtered.forEach(tag => {
            const label = document.createElement('label');
            label.className = 'flex items-center space-x-2.5 py-1 px-2 rounded-lg hover:bg-slate-900 cursor-pointer transition';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = tag;
            cb.checked = selectedTags.has(tag);
            cb.className = 'w-4 h-4 rounded border-slate-700 bg-slate-900 text-emerald-500 focus:ring-emerald-500/50 cursor-pointer';

            cb.addEventListener('change', () => {
              if (cb.checked) {
                if (selectedTags.size >= 3) {
                  cb.checked = false;
                  alert('You can select a maximum of 3 tags.');
                  return;
                }
                selectedTags.add(tag);
              } else {
                selectedTags.delete(tag);
              }
              tagCount.textContent = `${selectedTags.size} of 3 selected`;
            });

            const span = document.createElement('span');
            span.className = 'text-sm text-slate-300';
            span.textContent = tag;

            label.appendChild(cb);
            label.appendChild(span);
            block.appendChild(label);
          });

          tagChecklist.appendChild(block);
        });
      }

      renderTags();

      tagSearch.addEventListener('input', (e) => {
        renderTags(e.target.value);
      });

      document.getElementById('coach-register-form').addEventListener('submit', (e) => {
        e.preventDefault();

        if (selectedTags.size < 1 || selectedTags.size > 3) {
          alert('Please select between 1 and 3 tags / specialties.');
          return;
        }

        const bio = document.getElementById('cr-bio').value.trim();
        if (!bio) {
          alert('Please write a short bio about yourself.');
          document.getElementById('cr-bio').focus();
          return;
        }

        const pass = document.getElementById('cr-password').value;
        const confirmPass = document.getElementById('cr-confirm-password').value;

        if (pass !== confirmPass) {
          alert('Error: Passwords do not match!');
          return;
        }

        const coachData = {
          firstName: document.getElementById('cr-firstname').value.trim(),
          lastName: document.getElementById('cr-lastname').value.trim(),
          username: document.getElementById('cr-username').value.trim(),
          email: document.getElementById('cr-email').value.trim(),
          city: citySelect.value,
          password: pass,
          bio: bio,
          tags: [...selectedTags],
          price: document.getElementById('cr-price').value,
          role: 'coach',
          avatar: photoImg.src || '',
          gallery: galleryDataUrls,
        };

        const coaches = JSON.parse(localStorage.getItem('mocoach_coaches') || '[]');
        if (coaches.some(c => c.username === coachData.username)) {
          alert('Username already taken. Please choose another.');
          return;
        }
        if (coaches.some(c => c.email === coachData.email)) {
          alert('Email already registered. Please use another.');
          return;
        }

        coaches.push(coachData);
        localStorage.setItem('mocoach_coaches', JSON.stringify(coaches));
        sessionStorage.setItem('mocoach_auth', JSON.stringify({
          role: 'coach',
          username: coachData.username,
          userId: coachData.username,
          firstName: coachData.firstName,
          lastName: coachData.lastName,
          email: coachData.email,
          city: coachData.city,
          avatar: coachData.avatar,
          bio: coachData.bio,
          tags: coachData.tags,
          price: coachData.price,
          gallery: coachData.gallery,
        }));
        window.location.href = 'index.html';
      });
    });
  </script>

  <script src="js/app.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
