<header class="sticky top-0 z-50 bg-slate-950/40 backdrop-blur-sm border-b border-slate-900/20 hover:bg-slate-950/95 hover:backdrop-blur-md hover:border-slate-900/50 transition-all duration-500 ease-in-out">
  <div class="w-full mx-auto px-4 sm:px-6 lg:px-8 py-2 flex items-center justify-between">
    <div class="flex items-center space-x-6 lg:space-x-10">
      <a href="#home" class="flex items-center">
        <img src="assets/img/mocoach-logo.png" alt="MoCoach Logo" class="w-auto object-contain h-16 sm:h-20 lg:h-24">
      </a>
      <nav class="hidden lg:flex items-center space-x-6 xl:space-x-8 text-lg font-bold">
        <a href="#home" class="text-blue-400 flex items-center space-x-1.5">
          <i data-lucide="home" class="w-5 h-5"></i>
          <span>Home</span>
        </a>
        <a href="#home" onclick="setTimeout(()=>document.getElementById('how-it-works')?.scrollIntoView({behavior:'smooth'}),100)" class="text-slate-300 hover:text-white transition">How It Works</a>
        <a href="#home" onclick="setTimeout(()=>document.getElementById('explore')?.scrollIntoView({behavior:'smooth'}),100)" class="text-slate-300 hover:text-white transition">Explore Coaches</a>
      </nav>
    </div>
    <div class="flex items-center space-x-3">
      <div class="auth-login-btn flex items-center space-x-2">
        <button onclick="showAuthModal()" class="text-slate-300 hover:text-white text-sm font-bold transition">Sign In</button>
        <button onclick="showAuthModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2 rounded-xl transition">Sign Up</button>
      </div>
      <div class="auth-user-menu hidden flex items-center space-x-3">
        <a href="#profile" class="text-slate-300 hover:text-white text-sm font-bold transition">Profile</a>
        <a href="#inbox" class="text-slate-300 hover:text-white text-sm font-bold transition flex items-center space-x-1">
          <i data-lucide="message-square" class="w-4 h-4"></i>
          <span>Inbox</span>
        </a>
        <button onclick="clearAuth(); navigateTo('home')" class="text-slate-500 hover:text-red-400 text-sm font-bold transition">Sign Out</button>
        <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-300 text-sm font-bold shadow-md">
          <span class="auth-user-name">U</span>
        </div>
      </div>
    </div>
  </div>
</header>
