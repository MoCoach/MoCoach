<div id="page-apply" class="page-section hidden min-h-screen">
  <div class="max-w-3xl mx-auto px-8 py-12">
    <div class="flex items-center justify-between mb-8">
      <h2 class="text-3xl font-extrabold text-white">Apply as a Vetted Coach</h2>
      <a href="#home" class="text-slate-400 hover:text-white transition text-2xl">&times;</a>
    </div>
    <form id="apply-coach-form" class="bg-slate-900/60 rounded-2xl p-8 border border-slate-800 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm text-slate-400 mb-1">First Name *</label>
          <input name="first_name" required class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Last Name *</label>
          <input name="last_name" required class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none">
        </div>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Email Address *</label>
        <input name="email" type="email" required class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none" placeholder="your@email.com">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Zip Code *</label>
        <input name="zip_code" required class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none" placeholder="e.g. 74214">
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm text-slate-400 mb-1">Password *</label>
          <input name="password" type="password" required class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none" placeholder="Min 8 characters">
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Confirm Password *</label>
          <input name="confirm_password" type="password" required class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none" placeholder="Repeat password">
        </div>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Services Offered (tags) *</label>
        <div id="apply-tags-container" class="flex flex-wrap gap-3"><div class="text-slate-400 text-sm">Loading...</div></div>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Bio <span class="text-slate-500">(optional)</span></label>
        <textarea name="description" rows="4" class="w-full rounded-xl border border-slate-800 bg-slate-950 py-3 px-4 text-sm text-slate-200 focus:border-blue-500 focus:outline-none" placeholder="Tell us about yourself and your coaching style"></textarea>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Photos <span class="text-slate-500">(up to 10, first = profile picture)</span></label>
        <div id="photo-dropzone" class="border-2 border-dashed border-slate-700 hover:border-blue-500/50 rounded-2xl p-8 text-center cursor-pointer transition">
          <i data-lucide="upload" class="w-10 h-10 text-slate-500 mx-auto mb-3"></i>
          <p class="text-slate-400 text-sm">Drag & drop photos here or click to browse</p>
          <input id="photo-input" type="file" accept="image/png,image/jpeg,image/gif,image/webp" multiple class="hidden">
        </div>
        <div id="photo-previews" class="grid grid-cols-5 gap-3 mt-4"></div>
      </div>
      <p class="apply-error hidden text-red-400 text-sm"></p>
      <p class="apply-success hidden text-emerald-400 text-sm"></p>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition">Submit Application</button>
    </form>
  </div>
</div>
