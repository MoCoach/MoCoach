<div id="profile-view" class="hidden">
  <div id="profile-toast-container" class="fixed top-24 right-4 z-50 flex flex-col space-y-2 pointer-events-none"></div>

  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">

    <div class="flex items-center space-x-3 mb-2">
      <button id="profile-back-btn" class="text-slate-400 hover:text-white transition flex items-center space-x-1.5 text-sm">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span>Back to Home</span>
      </button>
    </div>

    <div id="profile-header-card" class="bg-white rounded-2xl shadow-lg p-6 md:p-8"></div>

    <div id="profile-personal-card" class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <div class="flex items-center space-x-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5 text-blue-600"></i>
        </div>
        <div>
          <h2 class="text-lg font-bold text-slate-800">Personal Information</h2>
          <p class="text-xs text-slate-500">Manage your profile details</p>
        </div>
      </div>
      <div id="profile-personal-form"></div>
    </div>

    <div id="profile-security-card" class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <div class="flex items-center space-x-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center">
          <i data-lucide="shield" class="w-5 h-5 text-amber-600"></i>
        </div>
        <div>
          <h2 class="text-lg font-bold text-slate-800">Security</h2>
          <p class="text-xs text-slate-500">Update your password</p>
        </div>
      </div>
      <div id="profile-security-form"></div>
    </div>

    <div id="profile-badges-card" class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <div class="flex items-center space-x-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center">
          <i data-lucide="award" class="w-5 h-5 text-emerald-600"></i>
        </div>
        <div>
          <h2 class="text-lg font-bold text-slate-800">Badges & Achievements</h2>
          <p class="text-xs text-slate-500">Badges received from coaches and given to coaches</p>
        </div>
      </div>
      <div id="profile-badges-grid"></div>
    </div>

  </div>
</div>
